<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARAM Mayhem Assistant - 首页</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
</head>
<body data-theme="abyssal">

<div class="theme-switcher">
  <button class="theme-btn active" onclick="setTheme('abyssal',this)">深渊竞技场</button>
  <button class="theme-btn" onclick="setTheme('luminous',this)">极简辉光</button>
  <button class="theme-btn" onclick="setTheme('neon',this)">霓虹脉冲</button>
</div>

<div class="phone-frame">

  <div class="status-bar">
    <span>9:41</span>
    <svg width="24" height="12" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.5" style="display:block;">
      <rect x="0" y="0" width="20" height="11" rx="2" stroke="var(--text-secondary)"/>
      <rect x="2" y="2" width="14" height="7" rx="1" fill="var(--accent-success)"/>
      <rect x="21" y="3" width="2.5" height="5" rx="0.5" fill="var(--text-secondary)"/>
    </svg>
  </div>

  <div class="content-area">

    <div class="logo-header">
      <div class="logo-main">ARAM MAYHEM</div>
      <div class="logo-sub">海克斯大乱斗信息差助手</div>
    </div>

    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="搜索英雄、符文、策略...">
    </div>

    <div class="carousel-container">
      <div class="carousel-slide">
        <div>
          <div class="carousel-title">14.8 版本更新公告</div>
          <div class="carousel-subtitle">全新英雄调整数据已上线</div>
        </div>
      </div>
      <div class="carousel-dots">
        <div class="carousel-dot active"></div>
        <div class="carousel-dot"></div>
        <div class="carousel-dot"></div>
      </div>
    </div>

    <div class="section-header">
      <h2>热门英雄</h2>
      <span class="view-all">查看全部 &gt;</span>
    </div>

    <div class="hero-card">
      <div class="hero-avatar fire">B</div>
      <div class="hero-info">
        <div class="hero-name">布兰德</div>
        <div class="hero-title">复仇焰魂</div>
      </div>
      <span class="badge s-plus">S+</span>
      <div class="hero-stats">
        <div class="hero-winrate good">53.2%</div>
      </div>
    </div>

    <div class="hero-card">
      <div class="hero-avatar light">L</div>
      <div class="hero-info">
        <div class="hero-name">拉克丝</div>
        <div class="hero-title">光辉女郎</div>
      </div>
      <span class="badge s">S</span>
      <div class="hero-stats">
        <div class="hero-winrate good">52.1%</div>
      </div>
    </div>

    <div class="hero-card">
      <div class="hero-avatar dark">V</div>
      <div class="hero-info">
        <div class="hero-name">薇古丝</div>
        <div class="hero-title">愁云使者</div>
      </div>
      <span class="badge a">A</span>
      <div class="hero-stats">
        <div class="hero-winrate good">51.5%</div>
      </div>
    </div>

    <div class="hero-card">
      <div class="hero-avatar nature">Z</div>
      <div class="hero-info">
        <div class="hero-name">婕拉</div>
        <div class="hero-title">荆棘之兴</div>
      </div>
      <span class="badge a">A</span>
      <div class="hero-stats">
        <div class="hero-winrate good">50.8%</div>
      </div>
    </div>

    <div class="section-header">
      <h2>热门强化符文</h2>
      <span class="view-all">查看全部 &gt;</span>
    </div>

    <div class="augment-card prismatic">
      <div class="augment-header">
        <div class="augment-icon prismatic">叠</div>
        <div class="augment-name">叠叠乐</div>
        <span class="badge prismatic" style="margin-left:auto;">棱彩</span>
      </div>
      <div class="augment-desc">每购买一件装备永久增加2%最大生命值</div>
    </div>

    <div class="augment-card gold">
      <div class="augment-header">
        <div class="augment-icon gold">赌</div>
        <div class="augment-name">赌徒</div>
        <span class="badge gold" style="margin-left:auto;">黄金</span>
      </div>
      <div class="augment-desc">每次刷新商店获得额外金币</div>
    </div>

    <div class="augment-card silver">
      <div class="augment-header">
        <div class="augment-icon silver">钱</div>
        <div class="augment-name">钱雨</div>
        <span class="badge silver" style="margin-left:auto;">白银</span>
      </div>
      <div class="augment-desc">每回合开始获得额外3金币</div>
    </div>

    <div style="height:12px;"></div>

  </div>

  <div class="bottom-nav">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>英雄</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>强化</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>社区</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </div>

</div>

<script>
function setTheme(theme, btn) {
  document.body.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}
</script>

</body>
</html>
