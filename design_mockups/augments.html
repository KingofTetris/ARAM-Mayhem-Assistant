<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARAM Mayhem Assistant - 强化符文</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
</head>
<body data-theme="abyssal">

<div class="theme-switcher">
  <button class="theme-btn active" onclick="setTheme('abyssal',this)">深渊竞技场</button>
  <button class="theme-btn" onclick="setTheme('luminous',this)">极简辉光</button>
  <button class="theme-btn" onclick="setTheme('neon',this)">霓虹脉冲</button>
</div>

<div class="phone-frame">

  <div class="status-bar">
    <span>9:41</span>
    <svg width="24" height="12" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.5" style="display:block;">
      <rect x="0" y="0" width="20" height="11" rx="2" stroke="var(--text-secondary)"/>
      <rect x="2" y="2" width="14" height="7" rx="1" fill="var(--accent-success)"/>
      <rect x="21" y="3" width="2.5" height="5" rx="0.5" fill="var(--text-secondary)"/>
    </svg>
  </div>

  <div class="content-area">

    <div class="tab-bar">
      <div class="tab active">棱彩符文</div>
      <div class="tab">黄金符文</div>
      <div class="tab">白银符文</div>
    </div>

    <div class="chip-group">
      <span class="chip active">全部</span>
      <span class="chip">叠叠乐</span>
      <span class="chip">赌徒</span>
      <span class="chip">钱雨</span>
      <span class="chip">救护车</span>
      <span class="chip">全自动</span>
      <span class="chip">自爆</span>
    </div>

    <div class="augment-card prismatic">
      <div class="augment-header">
        <div class="augment-icon prismatic">叠</div>
        <div class="augment-name">叠叠乐</div>
        <span class="badge prismatic" style="margin-left:auto;">棱彩</span>
      </div>
      <div class="augment-desc">每购买一件装备永久增加2%最大生命值</div>
    </div>

    <div class="augment-card prismatic">
      <div class="augment-header">
        <div class="augment-icon prismatic">猎</div>
        <div class="augment-name">终极狩猎</div>
        <span class="badge prismatic" style="margin-left:auto;">棱彩</span>
      </div>
      <div class="augment-desc">参与击杀永久减少大招冷却时间</div>
    </div>

    <div class="augment-card prismatic">
      <div class="augment-header">
        <div class="augment-icon prismatic">彗</div>
        <div class="augment-name">奥术彗星</div>
        <span class="badge prismatic" style="margin-left:auto;">棱彩</span>
      </div>
      <div class="augment-desc">技能命中英雄后召唤彗星造成额外伤害</div>
    </div>

    <div class="augment-card prismatic">
      <div class="augment-header">
        <div class="augment-icon prismatic">先</div>
        <div class="augment-name">先攻</div>
        <span class="badge prismatic" style="margin-left:auto;">棱彩</span>
      </div>
      <div class="augment-desc">率先攻击英雄获得额外金币和伤害加成</div>
    </div>

    <div class="divider"></div>

    <div class="section-header">
      <h2>🔗 套装协同进度</h2>
    </div>

    <div class="progress-section">
      <div class="progress-row">
        <div class="progress-label">叠叠乐</div>
        <div class="progress-track">
          <div class="progress-fill prismatic" style="width:66%;"></div>
        </div>
        <div class="progress-text">2/3</div>
      </div>
      <div class="progress-row">
        <div class="progress-label">赌徒</div>
        <div class="progress-track">
          <div class="progress-fill gold" style="width:33%;"></div>
        </div>
        <div class="progress-text">1/3</div>
      </div>
      <div class="progress-row">
        <div class="progress-label">钱雨</div>
        <div class="progress-track">
          <div class="progress-fill silver" style="width:100%;"></div>
        </div>
        <div class="progress-text complete">3/3</div>
      </div>
    </div>

    <div style="height:16px;"></div>

  </div>

  <div class="bottom-nav">
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>英雄</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>强化</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>社区</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </div>

</div>

<script>
function setTheme(theme, btn) {
  document.body.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}
</script>

</body>
</html>
